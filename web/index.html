<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sistem Pengelolaan Transaksi PT. Putra Fiva Sejahterah Cabang Jawa Tengah">

  <!-- Cache-Control Meta Tags -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lucifax PFS">
  <link rel="apple-touch-icon" href="assets/Logo_Fiva2.png?v=1.8.5">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/Logo_Fiva2.png?v=1.8.5"/>
  <link rel="shortcut icon" type="image/png" href="assets/Logo_Fiva2.png?v=1.8.5"/>

  <title>Lucifax - PFS Jateng</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Forcefully unregister all legacy service workers and clear CacheStorage on load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (let name of names) {
          caches.delete(name);
        }
      });
    }
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Load entrypoint with serviceWorker set to null (No PWA Service Worker Caching)
      _flutter.loader.loadEntrypoint({
        serviceWorker: null,
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
